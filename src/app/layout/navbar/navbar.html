<mat-toolbar color="primary">
    <span>
        Flight Tracking Simulation Dashboard
    </span>

    <span class="toolbar-spacer"></span>

    <mat-form-field appearance="outline">
        <mat-label>
            Role
        </mat-label>
        <mat-select [value]="selectedRole" (selectionChange)=" changeRole($event.value)">
            <mat-option [value]="UserRole.SUPERVISOR">
                Supervisor
            </mat-option>
            <mat-option [value]="UserRole.CONTROLLER">
                Controller
            </mat-option>
            <mat-option [value]="UserRole.VIEWER">
                Viewer
            </mat-option>
        </mat-select>
    </mat-form-field>
</mat-toolbar>
